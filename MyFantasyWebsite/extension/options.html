<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Fourth Down Setup</title><style>
body{margin:0;background:#101412;color:#f4f0e7;font:14px system-ui,sans-serif}.wrap{max-width:600px;margin:8vh auto;padding:36px;background:#171c19;border-top:5px solid #ff5c44}h1{font-size:36px;letter-spacing:-.04em;margin:0 0 8px}p{color:#9ca39c;line-height:1.6}label{display:grid;gap:7px;margin:22px 0;font-weight:700}input{padding:12px;border:1px solid #424943;background:#101412;color:#f4f0e7}button{border:0;background:#ff5c44;color:white;padding:12px 17px;font-weight:800;cursor:pointer}#status{color:#b8f36b;min-height:20px}.fine{font-size:11px}
</style></head><body><main class="wrap"><h1>Connect Fourth Down</h1><p>Tell the companion where your Fourth Down site lives and which ESPN team is yours. It reads completed picks only.</p><label>Fourth Down site URL<input id="siteUrl" placeholder="https://your-site.netlify.app"></label><label>Your ESPN team name<input id="teamName" placeholder="Sunday Scaries"></label><label>Draft room ID <small>(optional; ESPN league ID is used automatically)</small><input id="draftId" placeholder="12345678"></label><button id="save">Save & allow connection</button><p id="status"></p><p class="fine">Your ESPN credentials and cookies never leave ESPN. Chrome will ask permission only for the Fourth Down site you enter.</p></main><script src="options.js"></script></body></html>
